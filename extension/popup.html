<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <title>Recruiting Local Capture</title>
    <style>
      body {
        font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
        margin: 12px;
        width: 360px;
      }

      label {
        display: block;
        margin-top: 8px;
        font-size: 12px;
        color: #444;
      }

      input,
      select,
      button,
      textarea {
        box-sizing: border-box;
        width: 100%;
        margin-top: 4px;
        padding: 8px;
        font-size: 13px;
      }

      textarea {
        min-height: 84px;
        resize: vertical;
      }

      .row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      .triple-row {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 8px;
      }

      .wait-control {
        display: grid;
        grid-template-columns: 78px 1fr 78px;
        gap: 6px;
        align-items: end;
      }

      .section {
        margin-top: 14px;
        padding-top: 12px;
        border-top: 1px solid #d9dee3;
      }

      .status-box {
        margin-top: 10px;
        padding: 8px;
        background: #f4f6f8;
        border: 1px solid #d9dee3;
        white-space: pre-wrap;
        font-size: 12px;
        line-height: 1.5;
      }

      #batchStatus {
        min-height: 112px;
      }

      #batchLog {
        min-height: 160px;
        max-height: 220px;
        overflow: auto;
      }

      #status {
        min-height: 84px;
      }

      .hint {
        margin-top: 8px;
        font-size: 12px;
        color: #666;
        line-height: 1.4;
      }

      #automationAuto {
        margin-top: 12px;
        padding: 12px;
        border: 1px solid #087c56;
        border-radius: 4px;
        background: #0a9f6e;
        color: white;
        font-size: 16px;
        font-weight: 700;
        cursor: pointer;
      }

      #automationAuto:disabled {
        background: #91b7aa;
        cursor: wait;
      }
    </style>
  </head>
  <body>
    <label for="jobTitle">岗位名称</label>
    <input id="jobTitle" type="text" placeholder="Boss 推荐牛人 / 猎聘推荐人才">

    <label for="apiBase">本地接口地址</label>
    <input id="apiBase" type="text" value="http://127.0.0.1:17863">

    <label for="apiToken">本地接口 Token</label>
    <input id="apiToken" type="password" placeholder="从桌面端 Settings 复制">

    <div class="row">
      <div>
        <label for="scrollMode">滚动策略</label>
        <select id="scrollMode">
          <option value="end">End 键到底</option>
          <option value="page">整页滚动</option>
          <option value="fixed">固定步长</option>
        </select>
      </div>
      <div>
        <label for="scrollStep">滚动步长</label>
        <input id="scrollStep" type="number" value="900">
      </div>
    </div>

    <div class="row">
      <div>
        <label for="scrollWaitMs">滚动等待毫秒</label>
        <div class="wait-control">
          <button id="scrollWaitDown" type="button">-30ms</button>
          <input id="scrollWaitMs" type="number" min="0" step="30" value="30">
          <button id="scrollWaitUp" type="button">+30ms</button>
        </div>
      </div>
      <div>
        <label for="maxScrollCount">最大滚动轮次</label>
        <input id="maxScrollCount" type="number" value="80">
      </div>
    </div>

    <label for="noNewStopRounds">无新增停止轮次</label>
    <input id="noNewStopRounds" type="number" value="4">

    <button id="automationAuto">AUTO：滚动采集 + AI 初筛</button>
    <div class="hint">使用桌面端“自动化流程”页面已保存的筛选方案，一键滚动采集，导入后立即进行 AI 初筛。</div>

    <div class="triple-row" style="margin-top: 10px;">
      <button id="collectCurrent">采集当前已加载</button>
      <button id="collectAuto">自动滚动后采集</button>
      <button id="pauseScroll">暂停滚动</button>
    </div>

    <div class="hint">推荐采集支持 Boss 推荐页和猎聘推荐页。自动滚动中点击“暂停滚动”，会停止继续滚动并导入已采集卡片。</div>

    <div class="section">
      <label for="resumeMessage">沟通请求话术</label>
      <textarea id="resumeMessage" placeholder="方便发一份你的简历过来吗？"></textarea>

      <div class="row">
        <div>
          <label for="waitSeconds">等待附件秒数</label>
          <input id="waitSeconds" type="number" min="5" value="45">
        </div>
        <div>
          <label for="pollIntervalMs">轮询毫秒</label>
          <input id="pollIntervalMs" type="number" min="500" step="500" value="2000">
        </div>
      </div>

      <div class="row" style="margin-top: 10px;">
        <button id="requestResume">发送求简历</button>
        <button id="downloadResume">下载当前 PDF</button>
      </div>
      <button id="requestAndDownload" style="margin-top: 8px;">发送后等待并下载</button>

      <div class="hint">单会话功能只处理当前 Boss 聊天页里当前打开的会话。PDF 会下载到 Chrome 默认下载目录下的 <code>BossResumes/</code>。</div>
    </div>

    <div class="section">
      <div class="triple-row">
        <button id="startBatchRequest">批量求简历</button>
        <button id="startBatchDownload">批量下载附件</button>
        <button id="stopBatch">停止任务</button>
      </div>
      <div class="row">
        <div>
          <label for="batchActionDelaySeconds">每人间隔秒数</label>
          <input id="batchActionDelaySeconds" type="number" min="1" step="1" value="5">
        </div>
        <div>
          <label for="maxBatchSessions">每批最多人数</label>
          <input id="maxBatchSessions" type="number" min="1" max="50" step="1" value="50">
        </div>
      </div>
      <div class="hint">批量求简历会发话术并点击“求简历/附件简历”功能按钮，不等待下载。批量下载附件只扫描已有附件或待同意附件并下载。</div>
      <div id="batchStatus" class="status-box">批量任务：未启动。</div>
      <div class="hint">Runtime Log</div>
      <div id="batchLog" class="status-box">No runtime log yet.</div>
    </div>

    <div id="status" class="status-box">就绪。</div>

    <script src="popup.js"></script>
  </body>
</html>
